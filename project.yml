name: Ithuriel
options:
  bundleIdPrefix: dev.ithuriel
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "12.13.0"
targets:
  Ithuriel:
    type: application
    platform: macOS
    sources:
      - path: Ithuriel
        excludes:
          - "Resources/Info.plist"
          - "Resources/Ithuriel.entitlements"
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.ithuriel.agent
        PRODUCT_NAME: Ithuriel
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Ithuriel/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Ithuriel/Resources/Ithuriel.entitlements
