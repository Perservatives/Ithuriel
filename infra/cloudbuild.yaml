steps:
  # 1. Build the Cloud Run API container
  - name: gcr.io/cloud-builders/docker
    id: build-api
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ithuriel/api:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ithuriel/api:latest
      - -f
      - services/api/Dockerfile
      - services/api

  # 2. Push it
  - name: gcr.io/cloud-builders/docker
    id: push-api
    args: [push, --all-tags, "${_REGION}-docker.pkg.dev/$PROJECT_ID/ithuriel/api"]
    waitFor: [build-api]

  # 3. Deploy Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-api
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ithuriel-api
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/ithuriel/api:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --service-account=ithuriel-api@$PROJECT_ID.iam.gserviceaccount.com
    waitFor: [push-api]

  # 4. Deploy the Cloud Function (processor)
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-processor
    entrypoint: gcloud
    args:
      - functions
      - deploy
      - ithuriel-processor
      - --gen2
      - --runtime=python312
      - --region=${_REGION}
      - --source=services/functions/processor
      - --entry-point=handle
      - --trigger-topic=ithuriel-snapshots
      - --service-account=ithuriel-processor@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=GCP_PROJECT=$PROJECT_ID,VERTEX_REGION=${_REGION},GCS_BUCKET_SNAPSHOTS=${PROJECT_ID}-ithuriel-snapshots,PROCESSED_TOPIC=ithuriel-snapshots-processed

  # 5. Deploy Firestore + Storage rules
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-rules
    entrypoint: bash
    args:
      - -c
      - |
        cd infra
        npx -y firebase-tools deploy --project $PROJECT_ID --only firestore:rules,firestore:indexes,storage:rules --non-interactive

substitutions:
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s
